<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Indo-Polish Badminton Association</title>

    <meta property="og:title" content="Indo-Polish Badminton Association">
    <meta property="og:description" content="Bridging the communities of Poland and India through sport. Join our community in Krakow!">
    <meta property="og:image" content="https://ipba.pl/logo2.jpeg">
    <meta property="og:url" content="https://ipba.pl/">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://ipba.pl/">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #1a1a2e;
            --secondary: #8cc63f;
            --light: #ffffff;
            --gray: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-area img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--secondary); }
        .brand-name b { display: block; font-size: 1rem; color: var(--secondary); text-transform: uppercase; }

        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: 600; font-size: 0.9rem; }

        /* --- Hero --- */
        .hero {
            background: linear-gradient(rgba(26, 26, 46, 0.8), rgba(26, 26, 46, 0.8)), url('player1.png');
            background-size: cover;
            background-position: center;
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        /* --- Tournament Spotlight --- */
        .tournament-section {
            max-width: 1100px;
            margin: -40px auto 40px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .poster-img { width: 100%; border-radius: 12px; }

        .reg-btn {
            display: inline-block;
            padding: 15px 30px;
            background: #121212;
            color: var(--secondary);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 800;
            border: 2px solid var(--secondary);
            margin-top: 15px;
        }

        /* --- Gallery: Grid on Desktop, Slider on Mobile --- */
        .section { padding: 40px 5%; max-width: 1200px; margin: auto; }
        
        .gallery-container {
            width: 100%;
            overflow-x: auto;
            display: flex;
            gap: 15px;
            padding: 10px 0 20px 0;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .gallery-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

        .gallery-item {
            flex: 0 0 80%; /* Show 80% of image on mobile to hint at more */
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            scroll-snap-align: start;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Desktop Gallery View */
        @media (min-width: 768px) {
            .gallery-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                overflow-x: visible;
                scroll-snap-type: none;
            }
            .gallery-item {
                flex: none;
                width: 100%;
            }
        }

        /* --- Lightbox --- */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 10000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }
        #lightbox-img { max-width: 95%; max-height: 80%; border-radius: 8px; border: 2px solid var(--secondary); }
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-area" onclick="location.href='/'">
        <img src="logo2.jpeg" alt="IPBA Logo">
        <div class="brand-name"><b>Indo-Polish</b><span>Association</span></div>
    </div>
    <nav class="nav-links">
        <a href="#about">About</a>
        <a href="#gallery">Gallery</a>
        <a href="regulations">Regulations</a>
    </nav>
</header>

<section class="hero">
    <h1>IPBA Krakow</h1>
</section>

<div class="tournament-section">
    <div><img src="ipba_tournament_2026.png" alt="Tournament" class="poster-img"></div>
    <div class="details-box">
        <h2 style="color: var(--primary); margin-top:0;">2026 Tournament</h2>
        <p>Registration is now open for the 3rd Anniversary Open Championships.</p>
        <a href="https://forms.gle/Gsc846hzksYGXSE7A" target="_blank" class="reg-btn">REGISTER NOW</a>
    </div>
</div>

<section id="gallery" class="section">
    <h2 style="text-align: center; color: var(--primary);">Community Gallery</h2>
    <p style="text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 20px;" class="mobile-only">Swipe left to see more photos →</p>
    <div id="photo-grid" class="gallery-container" oncontextmenu="return false;">
        </div>
</section>

<div id="lightbox" onclick="closeLightbox()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img" src="" onclick="event.stopPropagation()">
</div>

<script>
    const GITHUB_USERNAME = 'aravindars'; 
    const REPO_NAME = 'ipsa';             
    const excludedFiles = ['logo2.jpeg', 'player1.png', 'ipba_tournament_2026.png', 'favicon.ico'];

    async function loadGallery() {
        const grid = document.getElementById('photo-grid');
        const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/`;

        try {
            const response = await fetch(apiUrl);
            const files = await response.json();
            grid.innerHTML = ''; 

            const imageExtensions = ['jpg', 'jpeg', 'png', 'webp'];
            files.forEach(file => {
                const extension = file.name.split('.').pop().toLowerCase();
                if (imageExtensions.includes(extension) && !excludedFiles.includes(file.name)) {
                    const img = document.createElement('img');
                    img.src = file.download_url; 
                    img.className = 'gallery-item';
                    img.onclick = () => openLightbox(file.download_url);
                    grid.appendChild(img);
                }
            });
        } catch (e) { console.log("Gallery offline"); }
    }

    async function openLightbox(url) {
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            lbImg.src = URL.createObjectURL(blob);
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        } catch (e) { lbImg.src = url; lb.style.display = 'flex'; }
    }

    function closeLightbox() {
        const lbImg = document.getElementById('lightbox-img');
        if (lbImg.src.startsWith('blob:')) URL.revokeObjectURL(lbImg.src);
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto'; 
    }

    loadGallery();
</script>

</body>
</html>
